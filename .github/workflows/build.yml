name: Build PCF Solution

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install dependencies
      run: npm install
    
    - name: Build PCF
      run: npm run build
    
    - name: Install pac CLI
      run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool --version 2.5.1

    - name: Create solution folder
      run: mkdir solution
    
    - name: Init solution
      working-directory: solution
      run: pac solution init --publisher-name PdfMerger --publisher-prefix pdf
    
    - name: Add PCF reference
      working-directory: solution
      run: pac solution add-reference --path ..

    - name: Fix cdsproj framework
      working-directory: solution
      run: |
        $file = Get-ChildItem *.cdsproj | Select-Object -First 1
        (Get-Content $file) -replace '<TargetFrameworkVersion>v4\.6\.2</TargetFrameworkVersion>', '' -replace '<TargetFramework>net462</TargetFramework>', '<TargetFramework>net462</TargetFramework>' | Set-Content $file
        (Get-Content $file) -replace 'net462', 'net48' | Set-Content $file
    
    - name: Restore solution
      working-directory: solution
      run: msbuild /t:restore
    
    - name: Build solution zip
      working-directory: solution
      run: msbuild
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PdfMerger-solution
        path: solution/bin/Debug/*.zip