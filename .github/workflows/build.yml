name: Build PCF Solution

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest   # cheaper, no Windows needed

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build PCF
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install pac CLI
        run: dotnet tool install --global Microsoft.PowerApps.CLI.Tool

      - name: Assemble unpacked solution folder
        run: |
          mkdir -p solution-src/Controls/pdf_PdfMergeControl.PdfMergeControl
          mkdir -p solution-src/Other

          cp out/controls/PdfMergeControl/bundle.js \
             solution-src/Controls/pdf_PdfMergeControl.PdfMergeControl/
          cp PdfMergeControl/ControlManifest.Input.xml \
             solution-src/Controls/pdf_PdfMergeControl.PdfMergeControl/

          cat > solution-src/Other/Solution.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ImportExportXml version="9.0.0.9690" SolutionPackageVersion="9.0"
            languagecode="1033" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
            <SolutionManifest>
              <UniqueName>PdfMergerPCF</UniqueName>
              <LocalizedNames>
                <LocalizedName description="PDF Merger PCF" languagecode="1033"/>
              </LocalizedNames>
              <Descriptions/>
              <Version>1.0.0.0</Version>
              <Managed>false</Managed>
              <Publisher>
                <UniqueName>PdfMerger</UniqueName>
                <LocalizedNames>
                  <LocalizedName description="PDF Merger" languagecode="1033"/>
                </LocalizedNames>
                <Descriptions/>
                <CustomizationPrefix>pdf</CustomizationPrefix>
                <CustomizationOptionValuePrefix>10000</CustomizationOptionValuePrefix>
              </Publisher>
              <RootComponents>
                <RootComponent type="66"
                  schemaName="pdf_PdfMergeControl.PdfMergeControl"
                  behavior="0"/>
              </RootComponents>
              <MissingDependencies/>
            </SolutionManifest>
          </ImportExportXml>
          EOF

      - name: Pack solution
        run: |
          ~/.dotnet/tools/pac solution pack \
            --zipfile PdfMergerPCF.zip \
            --folder solution-src \
            --packagetype Unmanaged

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfMerger-solution
          path: PdfMergerPCF.zip